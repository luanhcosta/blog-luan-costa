# Hugo configuration file
title: Luan Costa

defaultContentLanguage: en
defaultContentLanguageInSubdir: false

languages:
  en:
    languageName: English
    weight: 1
  pt:
    languageName: Português
    weight: 2

# import hextra as module
module:
  imports:
    - path: github.com/imfing/hextra
  mounts:
    - source: content
      target: content
    - source: layouts
      target: layouts
    - source: static
      target: static
    - source: static/images
      target: static/pt/images
    - source: data
      target: data
    - source: assets
      target: assets
    - source: i18n
      target: i18n
    - source: archetypes
      target: archetypes

markup:
  # allow raw html
  goldmark:
    renderer:
      unsafe: true
    extensions:
      passthrough:
        enable: true
        delimiters:
          block:
            - - "$$"
              - "$$"
          inline:
            - - "$"
              - "$"

  # enable hextra syntax highlight
  highlight:
    noClasses: false

menu:
  main:
    - name: Blog
      pageRef: /blog
      weight: 1
    - name: Search
      weight: 5
      params:
        type: search
    - name: Linkedin
      weight: 2
      url: "https://www.linkedin.com/in/luanhcosta"
      params:
        icon: linkedin
    - name: Twitter
      weight: 3
      url: "https://x.com/luanh_costa61"
      params:
        icon: x-twitter
    - name: GitHub
      weight: 4
      url: "https://github.com/luanhcosta"
      params:
        icon: github
    - name: Theme
      weight: 6
      params:
        type: theme-toggle

params:
  navbar:
    displayTitle: true
    displayLogo: false
  theme:
    displayToggle: false

  footer:
    displayCopyright: true
    displayPoweredBy: true

  editURL:
    enable: false
